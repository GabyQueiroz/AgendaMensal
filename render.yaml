services:
  - type: web
    name: agenda-mensal
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agenda-mensal-db
          property: connectionString

databases:
  - name: agenda-mensal-db
    databaseName: agenda_mensal
    plan: free
